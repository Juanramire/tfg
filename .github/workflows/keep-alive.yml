name: Keep Render awake

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping prod backend
        run: curl -fsS "${{ secrets.RENDER_BACKEND_PROD_URL }}" > /dev/null

      - name: Ping prod frontend
        run: curl -fsS "${{ secrets.RENDER_FRONTEND_PROD_URL }}" > /dev/null
