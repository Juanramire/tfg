name: Deploy pre-production (Render)

on:
  workflow_run:
    workflows: ["test-ci"]
    types: [completed]
    branches: [develop]

jobs:
  deploy:
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy backend
        run: curl -fsS "${{ secrets.RENDER_BACKEND_DEPLOY_HOOK }}"

      - name: Deploy frontend
        run: curl -fsS "${{ secrets.RENDER_FRONTEND_DEPLOY_HOOK }}"
