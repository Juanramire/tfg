name: Codacy CI

on:
  push:
    branches-ignore:
      - main
      
jobs:
  codacy-security-scan:
    name: Codacy Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Codacy Analysis CLI
        uses: codacy/codacy-analysis-cli-action@v4
        with:
          verbose: true
          # Descomentar las siguientes líneas si quiero que el workflow falle automáticamente
          # si el código no cumple ciertos estándares de Codacy:
          # fail-if-incomplete: true
