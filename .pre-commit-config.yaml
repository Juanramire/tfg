repos:
  # Backend: ruff (linter + formatter para Python)
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.5.7
    hooks:
      - id: ruff
        args: [--fix]
        files: ^backend/
      - id: ruff-format
        files: ^backend/

  # Frontend: ESLint
  - repo: local
    hooks:
      - id: eslint
        name: ESLint (frontend)
        language: system
        entry: npm --prefix frontend run lint
        files: ^frontend/.*\.(js|jsx)$
        pass_filenames: false
